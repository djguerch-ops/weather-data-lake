name: Terraform CI/CD

on:
  push:
    branches: [main]
    paths:
      - "terraform/envs/dev/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/envs/dev/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: terraform/envs/dev
  AWS_REGION: eu-west-1
  TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
  TF_VAR_raw_bucket_name: ${{ vars.TF_VAR_raw_bucket_name }}

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::563683519302:role/weather-github-actions-role
          role-session-name: GitHubActions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Build Lambda deployment package
        run: |
          mkdir -p src/lambda/kinesis_to_s3/build
          cd src/lambda/kinesis_to_s3
          zip -j build/lambda.zip handler.py

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  terraform-apply:
    name: Terraform Apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: terraform-plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::563683519302:role/weather-github-actions-role
          role-session-name: GitHubActions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Build Lambda deployment package
        run: |
          mkdir -p src/lambda/kinesis_to_s3/build
          cd src/lambda/kinesis_to_s3
          zip -j build/lambda.zip handler.py

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          sleep 30
          terraform apply -auto-approve -input=false
